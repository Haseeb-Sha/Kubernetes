apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mosquito-deployment
  labels:
    app: mosquito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquito
  template:
    metadata:
      labels:
        app: mosquito

    spec:
      containers:
        - name: mosquito
          image: eclipse-mosquitto:2.0
          ports:
            - containerPort: 1883

          volumeMounts:
            - name: mosquito-config
              mountPath: /mosquitto/config                        # adding these values in the container
            - name: mosquito-secret
              mountPath: /mosquitto/secret
              readOnly: true
            
          
    
      volumes:
        - name: mosquito-config
          configMap:                                     #type of thing to be mounted
            name: mosquito-configmap                     #  name that you have created
        - name: mosquito-secret
          secret:
            secretName: mosquito-secret
